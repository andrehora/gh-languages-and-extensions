name: Update Data

on:
  schedule:
    - cron: '0 17 * * *'  # Daily at 14:00 BRT (UTC-3)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parse_languages.py
        run: python gh_langs/parse_languages.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'data: update language data'
          title: 'data: update language data'
          body: 'Automated update of language data.'
          branch: update-language-data
          delete-branch: true
          labels: update-data