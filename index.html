<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gh-langs - GitHub Languages Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(180deg, #f0f6ff 0%, #ffffff 100%);
      padding: 60px 20px 32px;
      border-bottom: 1px solid #e8edf5;
    }
    .page h1 {
      font-size: 1.7rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #656d76;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    /* Search */
    .search-wrap {
      position: relative;
      width: 100%;
    }
    .search-wrap input {
      display: block;
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #fff;
      color: #24292f;
      outline: none;
      -webkit-appearance: none;
    }
    .search-wrap input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
    }
    .search-wrap input::placeholder { color: #8b949e; }

    /* Suggestions */
    .sg-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      -webkit-overflow-scrolling: touch;
    }
    .sg-list.open { display: block; }

    .sg-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: pointer;
      gap: 8px;
    }
    .sg-item:not(:last-child) { border-bottom: 1px solid #eef0f2; }
    .sg-item:hover, .sg-item.on { background: #f6f8fa; }
    .sg-item-left {
      display: flex;
      align-items: baseline;
      min-width: 0;
      gap: 6px;
    }
    .sg-name { font-weight: 500; font-size: 0.95rem; white-space: nowrap; }
    .sg-hint { color: #8b949e; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sg-empty { padding: 10px 14px; color: #8b949e; font-size: 0.875rem; }

    .pill {
      font-size: 0.73rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-programming { background: #ddf4ff; color: #0969da; }
    .pill-data        { background: #dafbe1; color: #1a7f37; }
    .pill-markup      { background: #fff8c5; color: #9a6700; }
    .pill-prose       { background: #ffeff7; color: #bf3989; }


    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .overlay.open {
      display: flex;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #eef0f2;
    }
    .card-title { display: flex; align-items: center; gap: 10px; }
    .card-head h2 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .card-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #656d76;
      cursor: pointer;
      line-height: 1;
      padding: 0 0 0 12px;
    }
    .card-close:hover { color: #24292f; }
    .card-share { background: none; border: none; font-size: 0.78rem; color: #656d76; cursor: pointer; padding: 0 8px 0 0; display: flex; align-items: center; gap: 4px; }
    .card-share:hover { color: #24292f; }
    .card-actions { display: flex; align-items: center; }
    .card-body { padding: 4px 20px 20px; }

    .field { padding: 10px 0; }
    .field + .field { border-top: 1px solid #eef0f2; }
    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #656d76;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .field-count { font-weight: 400; text-transform: none; letter-spacing: 0; color: #8b949e; }
    .copy-btn {
      background: none;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      color: #656d76;
      cursor: pointer;
      font-size: 0.65rem;
      padding: 1px 6px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: #24292f; border-color: #24292f; }
    .copy-btn.copied { color: #1a7f37; border-color: #1a7f37; }
    .field-value { font-size: 0.93rem; line-height: 1.7; word-break: break-word; }

    .tag {
      display: inline-block;
      background: #f6f8fa;
      border: 1px solid #e8ebef;
      color: #24292f;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 0.84rem;
      margin: 2px 3px 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty { color: #8b949e; font-style: italic; font-size: 0.84rem; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e8edf5;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-size: 1.3rem;
      font-weight: 600;
      color: #24292f;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #656d76;
      margin-top: 2px;
    }

    .foot {
      text-align: center;
      color: #8b949e;
      font-size: 0.78rem;
      padding: 28px 16px 16px;
      border-top: 1px solid #e8edf5;
    }
    .foot a { color: #656d76; }

    #recent-label { font-size: 0.75rem; color: #8b949e; margin-bottom: 6px; }
    .recent-btn { background: none; border: 1px solid #d0d7de; border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; color: #24292f; cursor: pointer; }
    .recent-btn:hover { background: #f6f8fa; }
    #lang-list { padding: 20px 20px 32px; }
    .lang-group { margin-top: 20px; text-align: center; }
    .lang-group-title { margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .pill-toggle { border: none; cursor: pointer; transition: opacity 0.15s; }
    .lang-count { color: #8b949e; font-size: 0.8rem; }
    .lang-links { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .lang-link { background: none; border: none; padding: 0; cursor: pointer; font: inherit; text-decoration: underline; color: #24292f; font-size: 0.85rem; }
    .lang-link:hover { opacity: 0.7; }

    @media (max-width: 500px) {
      .hero { padding: 40px 14px 24px; }
      .page h1 { font-size: 1.2rem; }
      .subtitle { font-size: 0.8rem; margin-bottom: 18px; }
      .sg-list { max-height: 50vh; }
      .card-head { padding: 14px 16px; }
      .card-body { padding: 4px 16px 16px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="hero">
    <p style="text-align: center; margin-bottom: 16px;"><a href="https://github.com/andrehora/gh-langs" target="_blank" rel="noopener" style="color: #24292f; text-decoration: none; font-size: 1.1rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;"><svg height="20" width="20" viewBox="0 0 16 16" fill="#24292f" style="vertical-align: middle;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>andrehora/gh-langs</a></p>
    <h1>GitHub Languages Explorer</h1>
    <p class="subtitle">Search languages by name, extension, alias, and filename</p>

    <div class="search-wrap" id="sw">
      <input type="text" id="q" placeholder="Type to search... e.g. python, .js, Markdown" autocomplete="off">
      <div class="sg-list" id="sg"></div>
    </div>

    <div id="recent" style="display:none; text-align:center; margin: 12px 0 0;"></div>

    <div class="stats" id="stats"></div>

  </div>

  <div id="lang-list"></div>

  <div class="foot">Data from <a href="https://github.com/github-linguist/linguist" target="_blank" rel="noopener">GitHub Linguist</a> and <a href="https://github.com/andrehora/gh-langs" target="_blank" rel="noopener">gh-langs</a></div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="card">
    <div class="card-head">
      <div class="card-title">
        <img id="cIcon" src="" alt="" style="display:none; width:28px; height:28px;">
        <h2 id="cTitle"></h2>
      </div>
      <div class="card-actions">
        <button class="card-share" id="cShare"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/></svg>Copy link</button>
        <button class="card-close" id="cClose">&times;</button>
      </div>
    </div>
    <div class="card-body" id="cBody"></div>
  </div>
</div>

<script>
var data = [], idx = -1, results = [];

function parseCSV(txt) {
  var lines = txt.split('\n'), hdr = csvSplit(lines[0]), out = [];
  for (var i = 1; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l) continue;
    var v = csvSplit(l), row = {};
    hdr.forEach(function(h, j) { row[h.trim()] = (v[j] || '').trim(); });
    out.push(row);
  }
  return out;
}

function csvSplit(line) {
  var r = [], c = '', q = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { if (q && line[i+1] === '"') { c += '"'; i++; } else q = !q; }
    else if (ch === ',' && !q) { r.push(c); c = ''; }
    else c += ch;
  }
  r.push(c); return r;
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function highlight(s, q) {
  if (!q || s.toLowerCase().indexOf(q.toLowerCase()) !== 0) return esc(s);
  return '<strong>' + esc(s.slice(0, q.length)) + '</strong>' + esc(s.slice(q.length));
}

function pill(t) {
  var v = (t || '').toLowerCase();
  var cls = v === 'programming' ? 'pill-programming' : v === 'data' ? 'pill-data' : v === 'markup' ? 'pill-markup' : v === 'prose' ? 'pill-prose' : 'pill-data';
  return '<span class="pill ' + cls + '">' + esc(t) + '</span>';
}

function matchToken(field, q) {
  var parts = field.split(';');
  for (var i = 0; i < parts.length; i++) {
    var t = parts[i].trim();
    if (t && t.toLowerCase().indexOf(q) === 0) return t;
  }
  return null;
}

function search(q) {
  if (!q) return [];
  var ql = q.toLowerCase(), res = [];
  for (var i = 0; i < data.length; i++) {
    var r = data[i], m = null;
    var mt;
    if ((r.language || '').toLowerCase().indexOf(ql) === 0) m = '';
    else if ((mt = matchToken(r.aliases || '', ql)) !== null) m = 'alias: ' + mt;
    else if ((mt = matchToken(r.extensions || '', ql)) !== null) m = 'ext: ' + mt;
    else if ((mt = matchToken(r.filenames || '', ql)) !== null) m = 'file: ' + mt;
    if (m !== null) res.push({ r: r, m: m });
    if (res.length >= 15) break;
  }
  return res;
}

var input = document.getElementById('q');
var sg = document.getElementById('sg');

function render(list, q) {
  idx = -1; results = list;
  if (!list.length) {
    if (q) {
      var tip = /^[a-z0-9]+$/i.test(q) ? ' — try <strong>.' + esc(q) + '</strong> to search by extension' : '';
      sg.innerHTML = '<div class="sg-empty">No results for "' + esc(q) + '"' + tip + '</div>';
      sg.classList.add('open');
    }
    else { sg.innerHTML = ''; sg.classList.remove('open'); }
    return;
  }
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var it = list[i];
    var hintText = it.m ? it.m.replace(/^(alias|ext|file): /, '') : '';
    var hintPrefix = it.m ? it.m.match(/^(alias|ext|file): /) : null;
    var hint = it.m ? '<span class="sg-hint">' + (hintPrefix ? esc(hintPrefix[0]) : '') + highlight(hintText, q) + '</span>' : '';
    html += '<div class="sg-item" data-i="' + i + '">'
      + '<div class="sg-item-left"><span class="sg-name">' + highlight(it.r.language, q) + '</span>' + hint + '</div>'
      + pill(it.r.type) + '</div>';
  }
  sg.innerHTML = html;
  sg.classList.add('open');
  var rows = sg.querySelectorAll('.sg-item');
  for (var j = 0; j < rows.length; j++) {
    rows[j].addEventListener('click', (function(k) {
      return function() { show(results[k].r); sg.classList.remove('open'); };
    })(j));
  }
}

function tags(field) {
  if (!field) return '<span class="empty">None</span>';
  var parts = field.split(';'), out = '';
  for (var i = 0; i < parts.length; i++) {
    var t = parts[i].trim();
    if (t) out += '<span class="tag">' + esc(t) + '</span>';
  }
  return out || '<span class="empty">None</span>';
}

function formatForCopy(field) {
  if (!field) return '';
  var parts = field.split(';'), out = [];
  for (var i = 0; i < parts.length; i++) {
    var t = parts[i].trim();
    if (t) out.push('"' + t + '"');
  }
  return out.join(', ');
}

function copyField(btn, field) {
  var text = formatForCopy(field);
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

var RECENT_KEY = 'gh-langs-recent';
var RECENT_MAX = 5;

function saveRecent(name) {
  var list = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  list = list.filter(function(n) { return n !== name; });
  list.unshift(name);
  if (list.length > RECENT_MAX) list = list.slice(0, RECENT_MAX);
  localStorage.setItem(RECENT_KEY, JSON.stringify(list));
  renderRecent();
}

function renderRecent() {
  var list = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  var el = document.getElementById('recent');
  if (!list.length) { el.style.display = 'none'; return; }
  var html = '<div id="recent-label">Recently viewed</div>';
  for (var i = 0; i < list.length; i++) {
    html += '<button class="recent-btn" data-name="' + esc(list[i]) + '">' + esc(list[i]) + '</button> ';
  }
  el.innerHTML = html;
  el.style.display = 'block';
  var btns = el.querySelectorAll('.recent-btn');
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener('click', (function(btn) {
      return function() {
        var name = btn.dataset.name;
        for (var k = 0; k < data.length; k++) {
          if (data[k].language === name) { show(data[k]); break; }
        }
      };
    })(btns[j]));
  }
}

function tokenCount(field) {
  if (!field) return 0;
  return field.split(';').filter(function(t) { return t.trim(); }).length;
}

function labelWithCount(label, field) {
  var n = tokenCount(field);
  return label + (n ? ' <span class="field-count">(' + n + ')</span>' : '');
}

var DEVICON_BASE = 'https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/';

function deviconName(lang) {
  return lang.toLowerCase()
    .replace(/\+\+/g, 'plusplus')
    .replace(/#/g, 'sharp')
    .replace(/[^a-z0-9]/g, '');
}

function loadIcon(lang) {
  var name = deviconName(lang);
  var img = document.getElementById('cIcon');
  img.style.display = 'none';
  var styles = ['plain', 'original', 'line', 'plain-wordmark', 'original-wordmark'];
  var si = 0;
  function tryNext() {
    if (si >= styles.length) return;
    var style = styles[si++];
    img.onerror = function() { tryNext(); };
    img.onload = function() { img.style.display = 'inline-block'; };
    img.src = DEVICON_BASE + name + '/' + name + '-' + style + '.svg';
  }
  tryNext();
}

function show(r) {
  document.getElementById('cTitle').textContent = r.language;
  currentLang = r;
  loadIcon(r.language);
  var items = [
    { l: 'Type', v: pill(r.type), copy: false },
    { l: labelWithCount('Aliases', r.aliases), v: tags(r.aliases), copy: !!r.aliases, key: 'aliases' },
    { l: labelWithCount('Extensions', r.extensions), v: tags(r.extensions), copy: !!r.extensions, key: 'extensions' },
    { l: labelWithCount('Filenames', r.filenames), v: tags(r.filenames), copy: !!r.filenames, key: 'filenames' }
  ];
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var copyBtn = items[i].copy ? '<button class="copy-btn" data-key="' + items[i].key + '">Copy</button>' : '';
    html += '<div class="field"><div class="field-label"><span>' + items[i].l + '</span>' + copyBtn + '</div><div class="field-value">' + items[i].v + '</div></div>';
  }
  document.getElementById('cBody').innerHTML = html;
  var btns = document.getElementById('cBody').querySelectorAll('.copy-btn');
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener('click', (function(btn) {
      return function() { copyField(btn, currentLang[btn.dataset.key]); };
    })(btns[j]));
  }
  document.getElementById('overlay').classList.add('open');
  history.replaceState(null, '', '#' + encodeURIComponent(r.language));
  saveRecent(r.language);
}
var currentLang = null;

function countItems(key) {
  var seen = {};
  for (var i = 0; i < data.length; i++) {
    var v = data[i][key];
    if (v) { var parts = v.split(';'); for (var j = 0; j < parts.length; j++) { var t = parts[j].trim(); if (t) seen[t] = 1; } }
  }
  return Object.keys(seen).length;
}

function showStats() {
  var stats = [
    { n: data.length, l: 'Languages' },
    { n: countItems('extensions'), l: 'Extensions' },
    { n: countItems('aliases'), l: 'Aliases' },
    { n: countItems('filenames'), l: 'Filenames' }
  ];
  var html = '';
  for (var i = 0; i < stats.length; i++) {
    html += '<div class="stat"><div class="stat-num">' + stats[i].n + '</div><div class="stat-label">' + stats[i].l + '</div></div>';
  }
  document.getElementById('stats').innerHTML = html;

  var types = ['programming', 'data', 'markup', 'prose'];
  var groups = {};
  for (var i = 0; i < data.length; i++) {
    var t = (data[i].type || '').toLowerCase();
    if (!groups[t]) groups[t] = [];
    groups[t].push({ r: data[i], idx: i });
  }
  var lhtml = '';
  for (var ti = 0; ti < types.length; ti++) {
    var type = types[ti];
    var langs = groups[type];
    if (!langs || !langs.length) continue;
    langs.sort(function(a, b) { return a.r.language.localeCompare(b.r.language); });
    lhtml += '<div class="lang-group" data-type="' + esc(type) + '"><div class="lang-group-title"><button class="pill-toggle ' + ('pill pill-' + type) + '" data-type="' + esc(type) + '" style="opacity:0.45">' + esc(langs[0].r.type) + '</button> <span class="lang-count">(' + langs.length + ')</span></div><div class="lang-links" style="display:none">';
    for (var li = 0; li < langs.length; li++) {
      lhtml += '<button class="lang-link" data-i="' + langs[li].idx + '">' + esc(langs[li].r.language) + '</button>';
    }
    lhtml += '</div></div>';
  }
  var ll = document.getElementById('lang-list');
  ll.innerHTML = lhtml;
  var btns = ll.querySelectorAll('.lang-link');
  for (var bi = 0; bi < btns.length; bi++) {
    btns[bi].addEventListener('click', (function(btn) {
      return function() { show(data[parseInt(btn.dataset.i)]); };
    })(btns[bi]));
  }
  var toggles = ll.querySelectorAll('.pill-toggle');
  for (var pi = 0; pi < toggles.length; pi++) {
    toggles[pi].addEventListener('click', (function(btn) {
      return function() {
        var group = ll.querySelector('.lang-group[data-type="' + btn.dataset.type + '"]');
        var links = group.querySelector('.lang-links');
        var collapsed = links.style.display === 'none';
        links.style.display = collapsed ? '' : 'none';
        btn.style.opacity = collapsed ? '' : '0.45';
      };
    })(toggles[pi]));
  }
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); history.replaceState(null, '', ' '); }

document.getElementById('cClose').addEventListener('click', closeModal);
document.getElementById('cShare').addEventListener('click', function() {
  navigator.clipboard.writeText(location.href).then(function() {
    var btn = document.getElementById('cShare');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/></svg>Copy link'; }, 1500);
  });
});
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

input.addEventListener('input', function() { var q = input.value.trim(); render(search(q), q); });

input.addEventListener('keydown', function(e) {
  var items = sg.querySelectorAll('.sg-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); hi(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); hi(items); }
  else if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); show(results[idx].r); sg.classList.remove('open'); }
  else if (e.key === 'Escape') sg.classList.remove('open');
});

function hi(items) {
  for (var i = 0; i < items.length; i++) {
    if (i === idx) { items[i].classList.add('on'); items[i].scrollIntoView({ block: 'nearest' }); }
    else items[i].classList.remove('on');
  }
}

document.addEventListener('click', function(e) {
  if (!document.getElementById('sw').contains(e.target)) sg.classList.remove('open');
});

fetch('data/languages.csv')
  .then(function(r) { if (!r.ok) throw new Error('Failed to load'); return r.text(); })
  .then(function(t) {
    data = parseCSV(t); showStats(); renderRecent(); input.focus();
    var hash = decodeURIComponent(location.hash.slice(1));
    if (hash) {
      for (var i = 0; i < data.length; i++) {
        if (data[i].language.toLowerCase() === hash.toLowerCase()) { show(data[i]); break; }
      }
    }
  })
  .catch(function(e) { console.error('Error loading data:', e.message); });
</script>
